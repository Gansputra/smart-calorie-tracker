<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background Container (Squircle / Rounded Square) -->
  <rect x="10" y="10" width="180" height="180" rx="50" ry="50" fill="#29C463" />

  <!-- Bar Chart Outline Group -->
  <g fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bar 1 (Terkecil - Kiri) -->
    <rect x="52" y="112" width="22" height="40" rx="11" />
    
    <!-- Bar 2 (Sedang - Tengah) -->
    <rect x="89" y="88" width="22" height="64" rx="11" />
    
    <!-- Bar 3 (Tertinggi - Kanan) -->
    <rect x="126" y="60" width="22" height="92" rx="11" />
  </g>
</svg>
